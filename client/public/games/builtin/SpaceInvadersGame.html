<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Space Invaders</title><style>
body{margin:0;background:#0a0a0f;color:#e0e0f0;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif}
canvas{border-radius:8px;max-width:100%;height:auto;display:block}
.hint{text-align:center;color:#6666aa;font-size:12px;margin-top:8px}
</style></head><body><div><canvas id="c" width="400" height="450"></canvas><div class="hint">← → move, Space shoot</div></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=400,H=450;
const state={player:{x:W/2-20,y:H-40,w:40,h:20},bullets:[],enemies:[],enemyDir:1,score:0,keys:{},dead:false,running:true};
for(let r=0;r<4;r++)for(let c=0;c<8;c++)state.enemies.push({x:c*45+20,y:r*35+30,w:35,h:25,alive:true});
const shoot=()=>{state.bullets.push({x:state.player.x+18,y:state.player.y,vy:-5})};
(function loop(){if(!state.running)return;
if(state.keys['ArrowLeft'])state.player.x=Math.max(0,state.player.x-4);
if(state.keys['ArrowRight'])state.player.x=Math.min(W-40,state.player.x+4);
if(state.keys[' ']){state.keys[' ']=false;shoot()}
state.bullets.forEach(b=>b.y+=b.vy);state.bullets=state.bullets.filter(b=>b.y>0);
let hitWall=false;
state.enemies.forEach(e=>{if(!e.alive)return;e.x+=state.enemyDir*1.5;if(e.x<=0||e.x+e.w>=W)hitWall=true});
if(hitWall){state.enemyDir=-state.enemyDir;state.enemies.forEach(e=>e.y+=10)}
state.bullets.forEach((b,bi)=>{state.enemies.forEach((e,ei)=>{if(!e.alive)return;if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){e.alive=false;state.bullets.splice(bi,1);state.score+=10}})});
state.enemies.forEach(e=>{if(!e.alive)return;if(e.y+e.h>=state.player.y&&e.x<state.player.x+state.player.w&&e.x+e.w>state.player.x)state.dead=true});
if(state.enemies.every(e=>!e.alive))state.running=false;
ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#00f0ff';ctx.shadowColor='#00f0ff';ctx.shadowBlur=8;ctx.fillRect(state.player.x,state.player.y,state.player.w,state.player.h);ctx.shadowBlur=0;
state.enemies.forEach(e=>{if(!e.alive)return;ctx.fillStyle='#ff00aa';ctx.shadowColor='#ff00aa';ctx.shadowBlur=6;ctx.fillRect(e.x,e.y,e.w,e.h)});
ctx.shadowBlur=0;state.bullets.forEach(b=>{ctx.fillStyle='#ffcc00';ctx.fillRect(b.x,b.y,4,12)});
ctx.fillStyle='#fff';ctx.font='16px Rajdhani';ctx.fillText('Score: '+state.score,10,20);
if(state.dead){ctx.fillStyle='#ff00aa';ctx.font='28px Orbitron';ctx.shadowColor='#ff00aa';ctx.shadowBlur=10;ctx.fillText('GAME OVER',W/2-90,H/2);ctx.shadowBlur=0}
requestAnimationFrame(loop)})();
const hk=e=>{state.keys[e.key]=e.type==='keydown';if(e.key===' '&&e.type==='keydown')e.preventDefault()};
window.addEventListener('keydown',hk);window.addEventListener('keyup',hk);
</script></body></html>
