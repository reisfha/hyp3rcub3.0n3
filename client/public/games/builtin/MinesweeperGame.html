<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Minesweeper</title><style>
body{margin:0;background:#0a0a0f;color:#e0e0f0;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;text-align:center}
.game{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;position:relative}
.board{display:grid;grid-template-columns:repeat(9,32px);gap:1px;background:#2a2a4e;padding:4px;border-radius:4px}
.cell{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:#1a1a2e;cursor:pointer;font-size:14px;font-weight:700;user-select:none}
.cell.revealed{background:#12121a}
.cell.mine{background:rgba(255,0,0,0.2)}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;border-radius:8px;z-index:10}
.overlay h2{font-family:'Orbitron',monospace;font-size:28px;color:#ff00aa;text-shadow:0 0 10px #ff00aa}
.overlay p{font-size:18px}
.btn{background:#00f0ff;color:#000;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-size:16px;font-weight:700}
.hint{font-size:12px;color:#6666aa}
</style></head><body><div class="game" id="game"><div class="board" id="board"></div><div class="hint">Left click to reveal, Right click to flag</div></div>
<script>
const ROWS=9,COLS=9,MINES=10;
let board=[],dead=false,won=false;
const initBoard=()=>{const b=Array(ROWS).fill(null).map(()=>Array(COLS).fill(null).map(()=>({mine:false,revealed:false,flagged:false,adjacent:0})));let placed=0;while(placed<MINES){const r=Math.floor(Math.random()*ROWS),c=Math.floor(Math.random()*COLS);if(!b[r][c].mine){b[r][c].mine=true;placed++}}for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){if(b[r][c].mine)continue;let count=0;for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&b[nr][nc].mine)count++}b[r][c].adjacent=count}return b};
const reveal=(b,r,c)=>{if(r<0||r>=ROWS||c<0||c>=COLS||b[r][c].revealed||b[r][c].flagged)return;b[r][c].revealed=true;if(b[r][c].adjacent===0&&!b[r][c].mine){for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)reveal(b,r+dr,c+dc)}};
const checkWin=b=>{const revealed=b.flat().filter(c=>c.revealed).length;const total=ROWS*COLS;return revealed===total-MINES};
const render=()=>{let html='';for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const cell=board[r][c];const cls='cell'+(cell.revealed?' revealed':'')+(cell.mine&&cell.revealed?' mine':'');const val=cell.revealed?(cell.mine?'💣':cell.adjacent||''):(cell.flagged?'🚩':'');html+='<div class="'+cls+'" data-r="'+r+'" data-c="'+c+'">'+val+'</div>'}document.getElementById('board').innerHTML=html};
const handleClick=e=>{if(dead||won)return;const t=e.target;if(!t.dataset||t.dataset.r===undefined)return;const r=+t.dataset.r,c=+t.dataset.c;if(board[r][c].flagged)return;const b=board.map(row=>row.map(cell=>({...cell})));if(b[r][c].mine){b[r][c].revealed=true;dead=true;board=b;render();const o=document.createElement('div');o.className='overlay';o.id='overlay';o.innerHTML='<h2>💥 Game Over</h2><button class="btn" onclick="restart()">Play Again</button>';document.getElementById('game').appendChild(o);return}reveal(b,r,c);board=b;render();if(checkWin(b)){won=true;const o=document.createElement('div');o.className='overlay';o.id='overlay';o.innerHTML='<h2>🎉 You Win!</h2><button class="btn" onclick="restart()">Play Again</button>';document.getElementById('game').appendChild(o)}};
const handleRightClick=e=>{e.preventDefault();if(dead||won)return;const t=e.target;if(!t.dataset||t.dataset.r===undefined)return;const r=+t.dataset.r,c=+t.dataset.c;if(board[r][c].revealed)return;const b=board.map(row=>row.map(cell=>({...cell})));b[r][c].flagged=!b[r][c].flagged;board=b;render()};
const restart=()=>{board=initBoard();dead=false;won=false;const o=document.getElementById('overlay');if(o)o.remove();render()};
board=initBoard();render();
document.getElementById('board').addEventListener('click',handleClick);
document.getElementById('board').addEventListener('contextmenu',handleRightClick);
</script></body></html>
