<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Void Maze</title><style>
body{margin:0;background:#0a0a0f;color:#e0e0f0;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;text-align:center}
.game{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;position:relative}
.hud{font-family:'Orbitron',monospace;font-size:14px;color:#00f0ff;letter-spacing:1px;text-transform:uppercase}
.hud span{margin:0 12px}
canvas{border-radius:4px;display:block;image-rendering:pixelated}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;border-radius:8px;z-index:10}
.overlay h2{font-family:'Orbitron',monospace;font-size:24px;color:#ff00aa;text-shadow:0 0 10px #ff00aa;margin:0}
.overlay p{font-size:18px;margin:4px 0}
.btn{background:#00f0ff;color:#000;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:'Orbitron',monospace;font-size:14px;font-weight:700}
.btn:hover{box-shadow:0 0 10px #00f0ff}
.hint{font-size:12px;color:#6666aa}
</style></head><body><div class="game" id="game"><div class="hud" id="hud"><span id="lvl">Level 1/20</span><span id="score">Score: 0</span><span id="room">Room 0,0 L1</span></div><canvas id="c"></canvas><div class="hint">WASD · Arrow Keys · Space (jump)</div></div>
<script>
var TILE=48,COLS=10,ROWS=8,W=COLS*TILE,H=ROWS*TILE,GRAVITY=0.45,JUMP_VEL=-7.5,MOVE_SPEED=2.5,PW=18,PH=34;
var LEVELS=[{roomsX:2,roomsY:4,layers:2,seed:1,shiftInterval:8000},{roomsX:2,roomsY:4,layers:2,seed:2,shiftInterval:7000},{roomsX:2,roomsY:4,layers:3,seed:3,shiftInterval:6500},{roomsX:2,roomsY:4,layers:3,seed:4,shiftInterval:6000},{roomsX:3,roomsY:4,layers:3,seed:5,shiftInterval:5500},{roomsX:3,roomsY:4,layers:3,seed:6,shiftInterval:5000},{roomsX:3,roomsY:4,layers:4,seed:7,shiftInterval:4500},{roomsX:3,roomsY:4,layers:4,seed:8,shiftInterval:4000},{roomsX:3,roomsY:5,layers:4,seed:9,shiftInterval:3800},{roomsX:3,roomsY:5,layers:4,seed:10,shiftInterval:3500},{roomsX:4,roomsY:4,layers:4,seed:11,shiftInterval:3200},{roomsX:4,roomsY:4,layers:4,seed:12,shiftInterval:3000},{roomsX:4,roomsY:5,layers:4,seed:13,shiftInterval:2800},{roomsX:4,roomsY:5,layers:4,seed:14,shiftInterval:2500},{roomsX:4,roomsY:5,layers:5,seed:15,shiftInterval:2200},{roomsX:4,roomsY:5,layers:5,seed:16,shiftInterval:2000},{roomsX:4,roomsY:5,layers:5,seed:17,shiftInterval:1800},{roomsX:4,roomsY:6,layers:5,seed:18,shiftInterval:1500},{roomsX:4,roomsY:6,layers:5,seed:19,shiftInterval:1200},{roomsX:5,roomsY:5,layers:6,seed:20,shiftInterval:1000}];
function mulberry32(e){var s=e|0;return function(){s=s+0x6D2B79F5|0;var t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function shuffle(e,t){var a=[].concat(e),i;for(i=a.length-1;i>0;i--){var r=Math.floor(t()*(i+1)),n=a[i];a[i]=a[r];a[r]=n}return a}
function generateRoom(e,t,edges){var rng=mulberry32(e),grid=Array.from({length:ROWS},function(){return Array(COLS).fill(0)}),x,y;for(x=0;x<COLS;x++)grid[ROWS-1][x]=1;if(edges.bottom)for(x=1;x<COLS-1;x++)if(rng()<0.7)grid[ROWS-1][x]=1;for(x=0;x<COLS;x++)grid[0][x]=1;if(edges.top)for(x=1;x<COLS-1;x++)if(rng()<0.7)grid[0][x]=1;for(y=0;y<ROWS;y++)grid[y][0]=1;if(edges.left)for(y=0;y<ROWS;y++)grid[y][0]=0;for(y=0;y<ROWS;y++)grid[y][COLS-1]=1;if(edges.right)for(y=0;y<ROWS;y++)grid[y][COLS-1]=0;var platCount=Math.floor(rng()*4)+2;for(var i=0;i<platCount;i++){x=Math.floor(rng()*(COLS-3))+1;y=Math.floor(rng()*5)+1;var w=Math.floor(rng()*3)+2;for(var j=0;j<w&&x+j<COLS-1;j++)grid[y][x+j]=1}if(t){var candidates=[];for(y=0;y<ROWS;y++)for(x=0;x<COLS;x++)if(grid[y][x]===0&&(y===ROWS-1||grid[y+1][x]===1))candidates.push({x:x,y:y});if(candidates.length>0){var e2=candidates[Math.floor(rng()*candidates.length)];grid[e2.y][e2.x]=2}}return grid}
function generateLevel(e){var rng=mulberry32(e.seed),exitPos={x:Math.floor(rng()*e.roomsX),y:Math.floor(rng()*e.roomsY)},exitLayer=Math.floor(rng()*e.layers),rooms={},currentLayers={},ry,rx;for(ry=0;ry<e.roomsY;ry++)for(rx=0;rx<e.roomsX;rx++){var key=rx+','+ry;currentLayers[key]=0;rooms[key]=[];var edges={left:rx>0,right:rx<e.roomsX-1,top:ry>0,bottom:ry<e.roomsY-1};for(var l=0;l<e.layers;l++){var layerSeed=e.seed*1000+rx*100+ry*10+l,hasExit=rx===exitPos.x&&ry===exitPos.y&&l===exitLayer,room=generateRoom(layerSeed,hasExit,edges);room[ROWS-1][2]=1;rooms[key].push(room)}}return{rooms:rooms,cfg:e,exitPos:exitPos,exitLayer:exitLayer,currentLayers:currentLayers}}
function collides(e,t,a){var i=Math.floor(t/TILE),r=Math.floor(a/TILE),n=Math.floor((t+PW-1)/TILE),o=Math.floor((a+PH-1)/TILE);for(var s=r;s<=o;s++)for(var u=i;u<=n;u++){if(u<0||u>=COLS||s<0||s>=ROWS)return true;if(e[s][u]===1)return true}return false}
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');canvas.width=W;canvas.height=H;
var keys={},g=null,level=0,score=0,anim=null;
var lvlEl=document.getElementById('lvl'),scoreEl=document.getElementById('score'),roomEl=document.getElementById('room'),gameEl=document.getElementById('game');
function forceUpdate(){if(!g)return;level=g.level+1;score=g.score;lvlEl.textContent='Level '+(g.level+1)+'/'+LEVELS.length;scoreEl.textContent='Score: '+g.score;roomEl.textContent='Room '+g.roomPos.x+','+g.roomPos.y+' L'+((g.currentLayers[g.roomPos.x+','+g.roomPos.y]||0)+1);removeOverlay();if(g.lvlDone&&!g.gameDone){showOverlay('Room Clear!','Score: '+g.score,'Next Level',nextLevel)}if(g.gameDone){showOverlay('The Void Consumed All','Final Score: '+g.score,'Play Again',restart)}}
function initLevel(lvl){var cfg=LEVELS[Math.min(lvl,LEVELS.length-1)],world=generateLevel(cfg),key='0,0';g=Object.assign({},world,{level:lvl,score:g?g.score:0,lvlDone:false,gameDone:false,player:{x:TILE*2,y:(ROWS-1)*TILE-PH,vx:0,vy:0},roomPos:{x:0,y:0},grounded:true,grid:world.rooms[key][0],flashTimer:0,autoShiftTimer:cfg.shiftInterval});forceUpdate()}
function nextLevel(){if(!g)return;var next=g.level+1;if(next>=LEVELS.length){g.lvlDone=false;g.gameDone=true;forceUpdate();return}g.score+=500*(g.level+1);initLevel(next)}
function restart(){var s=g?g.score:0;initLevel(0);if(g)g.score=s}
function showOverlay(title,msg,btnText,onClick){removeOverlay();var o=document.createElement('div');o.className='overlay';o.id='overlay';o.innerHTML='<h2>'+title+'</h2><p>'+msg+'</p><button class="btn" id="ovbtn">'+btnText+'</button>';gameEl.appendChild(o);document.getElementById('ovbtn').addEventListener('click',onClick)}
function removeOverlay(){var o=document.getElementById('overlay');if(o){o.remove()}}
(function loop(){if(!g){anim=requestAnimationFrame(loop);return}var p=g.player;
if(!g.lvlDone&&!g.gameDone&&g.flashTimer===0){var mx=0;if(keys['a']||keys['ArrowLeft'])mx=-MOVE_SPEED;if(keys['d']||keys['ArrowRight'])mx=MOVE_SPEED;if((keys['w']||keys[' ']||keys['ArrowUp'])&&g.grounded){p.vy=JUMP_VEL;g.grounded=false}p.vx=mx;p.vy+=GRAVITY;if(p.vy>12)p.vy=12;var nx=p.x+p.vx,ny=p.y+p.vy,exited=false;
if(nx<0){if(g.roomPos.x>0){var oldKey=g.roomPos.x+','+g.roomPos.y;g.currentLayers[oldKey]=(g.currentLayers[oldKey]+1)%g.cfg.layers;g.roomPos.x--;var nk=g.roomPos.x+','+g.roomPos.y;g.grid=g.rooms[nk][g.currentLayers[nk]];p.x=TILE*2;p.y=(ROWS-1)*TILE-PH;p.vy=0;g.grounded=true;g.flashTimer=4;exited=true}else nx=0}else if(nx+PW>W){if(g.roomPos.x<g.cfg.roomsX-1){var oldKey=g.roomPos.x+','+g.roomPos.y;g.currentLayers[oldKey]=(g.currentLayers[oldKey]+1)%g.cfg.layers;g.roomPos.x++;var nk=g.roomPos.x+','+g.roomPos.y;g.grid=g.rooms[nk][g.currentLayers[nk]];p.x=TILE*2;p.y=(ROWS-1)*TILE-PH;p.vy=0;g.grounded=true;g.flashTimer=4;exited=true}else nx=W-PW}else if(ny<0){if(g.roomPos.y>0){var oldKey=g.roomPos.x+','+g.roomPos.y;g.currentLayers[oldKey]=(g.currentLayers[oldKey]+1)%g.cfg.layers;g.roomPos.y--;var nk=g.roomPos.x+','+g.roomPos.y;g.grid=g.rooms[nk][g.currentLayers[nk]];p.x=TILE*2;p.y=(ROWS-1)*TILE-PH;p.vy=0;g.grounded=true;g.flashTimer=4;exited=true}else ny=0}else if(ny+PH>H){if(g.roomPos.y<g.cfg.roomsY-1){var oldKey=g.roomPos.x+','+g.roomPos.y;g.currentLayers[oldKey]=(g.currentLayers[oldKey]+1)%g.cfg.layers;g.roomPos.y++;var nk=g.roomPos.x+','+g.roomPos.y;g.grid=g.rooms[nk][g.currentLayers[nk]];p.x=TILE*2;p.y=(ROWS-1)*TILE-PH;p.vy=0;g.grounded=true;g.flashTimer=4;exited=true}else ny=H-PH;p.vy=0}
if(!exited){if(collides(g.grid,nx,p.y)){if(p.vx>0)nx=Math.floor((nx+PW)/TILE)*TILE-PW;else nx=Math.ceil(nx/TILE)*TILE;p.vx=0}p.x=nx;if(collides(g.grid,p.x,ny)){if(p.vy>0){ny=Math.floor((ny+PH)/TILE)*TILE-PH;g.grounded=true}else ny=Math.ceil(ny/TILE)*TILE;p.vy=0}p.y=ny}
var px=Math.floor((p.x+PW/2)/TILE),py=Math.floor((p.y+PH/2)/TILE);if(px>=0&&px<COLS&&py>=0&&py<ROWS&&g.grid[py][px]===2&&!g.lvlDone){g.lvlDone=true;forceUpdate()}
g.autoShiftTimer-=16;if(g.autoShiftTimer<=0){g.autoShiftTimer=g.cfg.shiftInterval;var allKeys=Object.keys(g.rooms),sk=allKeys[Math.floor(Math.random()*allKeys.length)];g.currentLayers[sk]=(g.currentLayers[sk]+1)%g.cfg.layers;if(sk===g.roomPos.x+','+g.roomPos.y){g.grid=g.rooms[sk][g.currentLayers[sk]];g.flashTimer=4}}}
ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
if(g.flashTimer>0){g.flashTimer--;ctx.fillStyle='rgba(255,255,255,'+(g.flashTimer/4)+')';ctx.fillRect(0,0,W,H)}else{ctx.strokeStyle='#fff';ctx.lineWidth=1;for(var y=0;y<ROWS;y++)for(var x=0;x<COLS;x++){if(g.grid[y][x]===1)ctx.strokeRect(x*TILE,y*TILE,TILE,TILE);else if(g.grid[y][x]===2){ctx.fillStyle='#fff';var cx=x*TILE+TILE/2,cy=y*TILE+TILE/2;ctx.beginPath();ctx.moveTo(cx,cy-5);ctx.lineTo(cx+4,cy);ctx.lineTo(cx,cy+5);ctx.lineTo(cx-4,cy);ctx.closePath();ctx.fill()}}ctx.fillStyle='#fff';ctx.fillRect(p.x,p.y,PW,PH)}
anim=requestAnimationFrame(loop)})();
window.addEventListener('keydown',function(e){keys[e.key]=true;if(['w','a','s','d',' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.key)!==-1)e.preventDefault()});
window.addEventListener('keyup',function(e){keys[e.key]=false});
initLevel(0);
</script></body></html>
