<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Breakout</title><style>
body{margin:0;background:#0a0a0f;color:#e0e0f0;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif}
canvas{border-radius:8px;max-width:100%;height:auto;display:block}
.hint{text-align:center;color:#6666aa;font-size:12px;margin-top:8px}
</style></head><body><div><canvas id="c" width="480" height="360"></canvas><div class="hint">A/D or Arrow Keys to move. Press any key to start.</div></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=480,H=360,PADDLE_W=80,PADDLE_H=12,BALL_R=6,BRICK_ROWS=5,BRICK_COLS=8,BRICK_W=52,BRICK_H=18,BRICK_GAP=4;
const state={paddle:{x:W/2-PADDLE_W/2,y:H-30},ball:{x:W/2,y:H-45,dx:3,dy:-3,r:BALL_R},bricks:[],score:0,running:false,dead:false,keys:{}};
for(let r=0;r<BRICK_ROWS;r++)for(let c=0;c<BRICK_COLS;c++)state.bricks.push({x:c*(BRICK_W+BRICK_GAP)+20,y:r*(BRICK_H+BRICK_GAP)+30,w:BRICK_W,h:BRICK_H,alive:true});
const draw=()=>{ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#00f0ff';ctx.shadowColor='#00f0ff';ctx.shadowBlur=8;ctx.fillRect(state.paddle.x,state.paddle.y,PADDLE_W,PADDLE_H);ctx.shadowBlur=0;
ctx.beginPath();ctx.arc(state.ball.x,state.ball.y,BALL_R,0,Math.PI*2);ctx.fillStyle='#ff00aa';ctx.shadowColor='#ff00aa';ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;
state.bricks.forEach(brick=>{if(!brick.alive)return;ctx.fillStyle=['#ff0055','#ff3377','#ff00aa','#00f0ff','#00ccdd'][Math.floor(brick.y/60)%5];ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=4;ctx.fillRect(brick.x,brick.y,brick.w,brick.h)});
ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='14px Rajdhani';ctx.fillText('Score: '+state.score,10,H-8)};
const loop=()=>{if(!state.running||state.dead){if(state.dead)draw();return}
const p=state.paddle;if(state.keys['ArrowLeft']||state.keys['a'])p.x=Math.max(0,p.x-5);
if(state.keys['ArrowRight']||state.keys['d'])p.x=Math.min(W-PADDLE_W,p.x+5);
const b=state.ball;b.x+=b.dx;b.y+=b.dy;
if(b.x-b.r<0||b.x+b.r>W)b.dx=-b.dx;if(b.y-b.r<0)b.dy=-b.dy;
if(b.y+b.r>H){state.dead=true;draw();return}
if(b.y+b.r>p.y&&b.y-b.r<p.y+PADDLE_H&&b.x>p.x&&b.x<p.x+PADDLE_W){b.dy=-Math.abs(b.dy);const hit=(b.x-p.x-PADDLE_W/2)/(PADDLE_W/2);b.dx=hit*4}
state.bricks.forEach(brick=>{if(!brick.alive)return;if(b.x+b.r>brick.x&&b.x-b.r<brick.x+brick.w&&b.y+b.r>brick.y&&b.y-b.r<brick.y+brick.h){brick.alive=false;b.dy=-b.dy;state.score+=10}});
draw();requestAnimationFrame(loop)};
window.addEventListener('keydown',e=>{state.keys[e.key]=e.type==='keydown';if(e.type==='keydown'&&!state.running){state.running=true;loop()}});
window.addEventListener('keyup',e=>{state.keys[e.key]=false});
draw();
</script></body></html>
